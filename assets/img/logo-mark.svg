<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="MyWallyBot W circle mark">
  <defs>
    <linearGradient id="ringChrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b4856"/>
      <stop offset="35%" stop-color="#c8d3dc"/>
      <stop offset="55%" stop-color="#6a7884"/>
      <stop offset="80%" stop-color="#26b8e8"/>
      <stop offset="100%" stop-color="#0a4a78"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="72%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#66e5ff" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#66e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wChrome" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e6ecf2"/>
      <stop offset="45%" stop-color="#9aa6b2"/>
      <stop offset="100%" stop-color="#2e3640"/>
    </linearGradient>
    <linearGradient id="cyanV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7eecff"/>
      <stop offset="55%" stop-color="#2bbaff"/>
      <stop offset="100%" stop-color="#0c5cbf"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="92" fill="#030a14"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#ringChrome)" stroke-width="5.5"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#ringGlow)" stroke-width="6"/>

  <!-- Outer W: two triangular spears, flat tops, pointed bottoms, splayed outward -->
  <polygon points="44,50 84,50 80,150" fill="url(#wChrome)"/>
  <polygon points="156,50 116,50 120,150" fill="url(#wChrome)"/>

  <!-- Inner cyan V centered between wings, slightly deeper bottom -->
  <polygon points="86,50 114,50 100,156" fill="url(#cyanV)"/>
</svg>
